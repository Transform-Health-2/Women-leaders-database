<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform Health Women Leaders Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #e8ecf0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            text-align: center;
            padding: 48px 24px;
        }

        .logo {
            width: 200px;
            max-width: 60vw;
            margin-bottom: 40px;
        }

        /* Hi-fi badge */
        .hifi-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: #02598E;
            color: #fff;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 999px;
            margin-bottom: 28px;
        }
        .hifi-badge .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #F85A8E;
            flex-shrink: 0;
        }

        .headline {
            font-size: 13px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 6px;
            max-width: 400px;
            line-height: 1.5;
            letter-spacing: -0.2px;
        }
        .subline {
            font-size: 11px;
            color: #6b7280;
            margin-bottom: 44px;
            max-width: 360px;
            line-height: 1.6;
        }

        /* CTA button */
        @keyframes pulse-ring {
            0%   { box-shadow: 0 0 0 0 rgba(2,89,142,0.35); }
            70%  { box-shadow: 0 0 0 14px rgba(2,89,142,0); }
            100% { box-shadow: 0 0 0 0 rgba(2,89,142,0); }
        }
        @keyframes bounce-btn {
            0%, 100% { transform: translateY(0) scale(1); }
            40%       { transform: translateY(-10px) scale(1.04); }
            60%       { transform: translateY(-4px) scale(1.02); }
        }
        @keyframes nudge-arrow {
            0%, 100% { transform: translateX(0); }
            50%       { transform: translateX(5px); }
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #02598E;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 16px 36px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            animation: pulse-ring 2s ease-out infinite;
            transition: background 0.2s, transform 0.15s;
        }
        .cta-btn:hover {
            background: #F85A8E;
            animation: none;
        }
        .cta-btn:hover .cta-arrow {
            animation: nudge-arrow 0.5s ease-in-out infinite;
        }
        .cta-btn.clicked {
            animation: bounce-btn 0.6s ease forwards;
        }
        .cta-arrow {
            display: inline-block;
            font-size: 18px;
            line-height: 1;
        }

        /* Secondary links */
        .secondary-links {
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 11px;
            font-weight: 800;
            color: #6b7280;
        }
        .secondary-links a {
            color: #6b7280;
            text-decoration: none;
            border-bottom: 1px dashed #cbd5e0;
            padding-bottom: 1px;
            transition: color 0.15s;
        }
        .secondary-links a:hover { color: #02598E; }
        .secondary-links .divider {
            width: 1px; height: 12px;
            background: #cbd5e0;
        }
    </style>
</head>
<body>
    <img src="transform_health_directory/th-logo.png" alt="Transform Health" class="logo">

    <div class="hifi-badge">
        <span class="dot"></span>
        High-Fidelity Wireframe · Branded Design
    </div>

    <p class="headline">Women Leaders in Digital Health — Interactive Prototype</p>
    <p class="subline">Full branded look and feel · Live data from Google Sheets · Click through all screens and flows</p>

    <button id="ctaBtn" class="cta-btn">
        Start here <span class="cta-arrow">→</span>
    </button>

    <div class="secondary-links">
        <a href="transform_health_directory/wireframe-admin.html">Admin Dashboard</a>
        <span class="divider"></span>
        <a href="public/analytics-landing.html">Analytics</a>
    </div>

    <script>
        const btn = document.getElementById('ctaBtn');
        btn.addEventListener('click', () => {
            btn.classList.add('clicked');
            btn.style.animation = 'none';
            setTimeout(() => {
                window.location.href = 'transform_health_directory/wireframe-directory.html';
            }, 600);
        });
    </script>
</body>
</html>
