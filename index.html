<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform Health Women Leaders Directory</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f7f9fa;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }
        .logo {
            width: 480px;
            max-width: 90vw;
            margin-bottom: 32px;
        }
        .wireframe-badge {
            display: inline-block;
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 20px;
            margin-bottom: 28px;
        }
        .headline {
            font-size: 1.15rem;
            color: #4a5568;
            margin-bottom: 8px;
            max-width: 420px;
            line-height: 1.6;
        }
        .click-hint {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 36px;
        }
        .animated-text {
            font-size: 2.8rem;
            font-weight: 700;
            color: #02598E;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: color 0.25s;
            user-select: none;
        }
        .animated-text:hover {
            color: #F85A8E;
        }
        .animated-text:hover .arrow {
            transform: translateX(6px);
        }
        .arrow {
            display: inline-block;
            transition: transform 0.25s;
            font-style: normal;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-18px); }
        }
        .bounce {
            animation: bounce 0.75s;
        }
        .admin-link {
            margin-top: 32px;
            font-size: 0.82rem;
            color: #a0aec0;
        }
        .admin-link a {
            color: #718096;
            text-decoration: none;
            border-bottom: 1px dashed #cbd5e0;
        }
        .admin-link a:hover {
            color: #02598E;
        }
    </style>
</head>
<body>
    <img src="transform_health_directory/TH-Logo-Tag Top-FC.png" alt="Transform Health Logo" class="logo">

    <div class="wireframe-badge">Wireframe Preview</div>

    <p class="headline">Women Leaders in Digital Health Database — interactive wireframe prototype.</p>
    <p class="click-hint">Click below to open the directory wireframe.</p>

    <div id="animatedText" class="animated-text">
        Directory <span class="arrow">→</span>
    </div>

    <div class="admin-link">
        Also preview: <a href="transform_health_directory/wireframe-admin.html">Admin Dashboard wireframe</a>
    </div>

    <script>
        const animatedText = document.getElementById('animatedText');
        animatedText.addEventListener('click', () => {
            animatedText.classList.add('bounce');
            setTimeout(() => {
                window.location.href = 'transform_health_directory/wireframe-directory.html';
            }, 750);
        });
        animatedText.addEventListener('animationend', () => {
            animatedText.classList.remove('bounce');
        });
    </script>
</body>
</html>
